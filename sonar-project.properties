# --- Identidad del proyecto ---
sonar.projectKey=sociologia-web
sonar.projectName=Sociología Web
sonar.projectVersion=1.0

# --- Código fuente ---
# Ajusta si tienes más rutas de código
sonar.sources=src

# --- Exclusiones (artefactos y estáticos) ---
sonar.exclusions=**/node_modules/**,**/.next/**,**/coverage/**,**/public/**,**/dist/**,**/build/**,**/.scannerwork/**

# --- Evitar el conflicto JS/TS (clave del fix) ---
sonar.javascript.file.suffixes=.js,.jsx,.mjs,.cjs
sonar.typescript.file.suffixes=.ts,.tsx,.cts,.mts
sonar.typescript.tsconfigPath=tsconfig.json

# --- Tests y cobertura (opcional, si generas coverage) ---
# Apunta al lcov que genere tu runner (Jest/Vitest)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
# (opcional) reporte de ejecución de tests si lo exportas para Sonar:
# sonar.testExecutionReportPaths=test-report.xml

# --- Duplicaciones: ignora artefactos ---
sonar.cpd.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/build/**

# --- Seguridad (reglas JS/TS) ---
sonar.security.enabled=true
